apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: app-gateway
  namespace: k8s-helidon-app
spec:
  selector:
    istio: ingressgateway # use istio default controller
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "helidon-monitoring.ochacafe-s5.cf"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: app
  namespace: k8s-helidon-app
spec:
  hosts:
    - "helidon-monitoring.ochacafe-s5.cf"
  http:
    - route:
        - destination:
            host: k8s-helidon-app
            port:
              number: 80
